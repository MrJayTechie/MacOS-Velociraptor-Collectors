name: MacOS.Collection.OSName
description: |
  /System/Library/CoreServices/SystemVersion.plist on macOS to check OS and version and upload the file contents.
author: Ali Jammal

precondition: SELECT OS FROM info() WHERE OS =~ 'darwin'

parameters:
- name: OSGlob
  default: /System/Library/CoreServices/SystemVersion.plist,/System/Library/Kernels/kernel,/mach_kernel

sources:
- name: OS files
  query: |
    SELECT OSPath, Name, Mtime, Size,
           hash(path=OSPath) AS SHA256,
           upload(file=OSPath) AS Upload
    FROM glob(globs=split(string=OSGlob, sep=","))
