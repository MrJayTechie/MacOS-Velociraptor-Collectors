name: MacOS.Collection.iCloudLocalStorage
description: |
  Collect iCloud storage of local copies of documents
  
author: Ali Jammal

precondition: SELECT OS FROM info() WHERE OS =~ 'darwin'

parameters:
- name: iCloudLocalStorageGlob
  default: /Users/*/Library/Mobile Documents/**
sources:
- name: iCloudLocalStorage file
  query: |
    SELECT OSPath, Name, Mtime, Size,
           hash(path=OSPath) AS SHA256,
           upload(file=OSPath) AS Upload
    FROM glob(globs=split(string=iCloudLocalStorageGlob, sep=","))
