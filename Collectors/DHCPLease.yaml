name: MacOS.Collection.DHCPLease
description: |
  Contains the last known network settings for those interfaces using DHCP.
author: Ali Jammal

precondition: SELECT OS FROM info() WHERE OS =~ 'darwin'

parameters:
- name: DHCPGLob
  default: /private/var/db/dhcpclient/leases/** 

sources:
- name: DHCP File
  query: |
    SELECT OSPath, Name, Mtime, Size,
           hash(path=OSPath) AS SHA256,
           upload(file=OSPath) AS Upload
    FROM glob(globs=split(string=DHCPGLob, sep=","))