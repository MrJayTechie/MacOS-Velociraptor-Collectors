name: MacOS.Collection.utmpx
description: |
    Collects utmpx file
 
author: Ali Jammal

precondition: SELECT OS FROM info() WHERE OS =~ 'darwin'

parameters:
- name: utmpxGlob
  default: /private/var/run/utmpx

sources:
- name: utmpx Files
  query: |
    SELECT OSPath, Name, Mtime, Size,
           hash(path=OSPath) AS SHA256,
           upload(file=OSPath) AS Upload
    FROM glob(globs=split(string=utmpxGlob, sep=","))
