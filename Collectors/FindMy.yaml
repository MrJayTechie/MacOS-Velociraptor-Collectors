name: MacOS.Collection.FindMy
description: |
  Collect information about FindMy
author: Ali Jammal

precondition: SELECT OS FROM info() WHERE OS =~ 'darwin'

parameters:
- name: FindMyGlob
  default: /Users/*/Library/Caches/com.apple.findmy.fmipcore/Items.data,/Users/*/Library/Caches/com.apple.findmy.fmfcore/FriendCacheData.data

sources:
- name: FindMy Files
  query: |
    SELECT OSPath, Name, Mtime, Size,
           hash(path=OSPath) AS SHA256,
           upload(file=OSPath) AS Upload
    FROM glob(globs=split(string=FindMyGlob, sep=","))