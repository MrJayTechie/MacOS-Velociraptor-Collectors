name: MacOS.Live.Power
description: |
  Captures power management state, recent power events, uptime, memory pressure,
  and kernel sysctls. pmset log is tail-limited to the last 500 lines to avoid
  unbounded output.
author: Ali Jammal

precondition: SELECT OS FROM info() WHERE OS =~ 'darwin'

sources:
- name: PmsetEverything
  query: |
    LET run = SELECT Stdout, Stderr, ReturnCode FROM execve(argv=["pmset", "-g", "everything"])
    SELECT "pmset -g everything" AS Command, run[0].ReturnCode AS ExitCode,
           len(list=run[0].Stdout) AS StdoutBytes, len(list=run[0].Stderr) AS StderrBytes,
           run[0].Stderr AS Stderr,
           upload(accessor="data", file=run[0].Stdout, name="PmsetEverything.raw.txt") AS RawUpload
    FROM scope()

- name: PmsetLog
  query: |
    # pmset -g log can be huge; cap at last 500 lines. execve runs /bin/sh for piping.
    LET run = SELECT Stdout, Stderr, ReturnCode
              FROM execve(argv=["/bin/sh", "-c", "pmset -g log | tail -500"])
    SELECT "pmset -g log | tail -500" AS Command, run[0].ReturnCode AS ExitCode,
           len(list=run[0].Stdout) AS StdoutBytes, len(list=run[0].Stderr) AS StderrBytes,
           run[0].Stderr AS Stderr,
           upload(accessor="data", file=run[0].Stdout, name="PmsetLog.raw.txt") AS RawUpload
    FROM scope()

- name: Uptime
  query: |
    LET run = SELECT Stdout, Stderr, ReturnCode FROM execve(argv=["uptime"])
    SELECT "uptime" AS Command, run[0].ReturnCode AS ExitCode,
           len(list=run[0].Stdout) AS StdoutBytes, len(list=run[0].Stderr) AS StderrBytes,
           run[0].Stderr AS Stderr,
           upload(accessor="data", file=run[0].Stdout, name="Uptime.raw.txt") AS RawUpload
    FROM scope()

- name: VmStat
  query: |
    LET run = SELECT Stdout, Stderr, ReturnCode FROM execve(argv=["vm_stat"])
    SELECT "vm_stat" AS Command, run[0].ReturnCode AS ExitCode,
           len(list=run[0].Stdout) AS StdoutBytes, len(list=run[0].Stderr) AS StderrBytes,
           run[0].Stderr AS Stderr,
           upload(accessor="data", file=run[0].Stdout, name="VmStat.raw.txt") AS RawUpload
    FROM scope()

- name: Sysctl
  query: |
    LET run = SELECT Stdout, Stderr, ReturnCode FROM execve(argv=["sysctl", "-a"])
    SELECT "sysctl -a" AS Command, run[0].ReturnCode AS ExitCode,
           len(list=run[0].Stdout) AS StdoutBytes, len(list=run[0].Stderr) AS StderrBytes,
           run[0].Stderr AS Stderr,
           upload(accessor="data", file=run[0].Stdout, name="Sysctl.raw.txt") AS RawUpload
    FROM scope()
