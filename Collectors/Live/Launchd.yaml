name: MacOS.Live.Launchd
description: |
  Captures live launchd job state. Distinct from the on-disk .plist files
  (which the offline collector grabs) — this is what is currently loaded,
  enabled/disabled, and running.
author: Ali Jammal

precondition: SELECT OS FROM info() WHERE OS =~ 'darwin'

sources:
- name: LaunchctlList
  query: |
    LET run = SELECT Stdout, Stderr, ReturnCode FROM execve(argv=["launchctl", "list"])
    SELECT "launchctl list" AS Command, run[0].ReturnCode AS ExitCode,
           len(list=run[0].Stdout) AS StdoutBytes, len(list=run[0].Stderr) AS StderrBytes,
           run[0].Stderr AS Stderr,
           upload(accessor="data", file=run[0].Stdout, name="LaunchctlList.raw.txt") AS RawUpload
    FROM scope()

- name: LaunchctlPrintSystem
  query: |
    LET run = SELECT Stdout, Stderr, ReturnCode FROM execve(argv=["launchctl", "print", "system"])
    SELECT "launchctl print system" AS Command, run[0].ReturnCode AS ExitCode,
           len(list=run[0].Stdout) AS StdoutBytes, len(list=run[0].Stderr) AS StderrBytes,
           run[0].Stderr AS Stderr,
           upload(accessor="data", file=run[0].Stdout, name="LaunchctlPrintSystem.raw.txt") AS RawUpload
    FROM scope()

- name: LaunchctlPrintGui
  query: |
    LET uid = SELECT Stdout FROM execve(argv=["id", "-u"])
    LET run = SELECT Stdout, Stderr, ReturnCode
              FROM execve(argv=["launchctl", "print", "gui/" + regex_replace(source=uid[0].Stdout, re="\\s", replace="")])
    SELECT "launchctl print gui/<uid>" AS Command, run[0].ReturnCode AS ExitCode,
           len(list=run[0].Stdout) AS StdoutBytes, len(list=run[0].Stderr) AS StderrBytes,
           run[0].Stderr AS Stderr,
           upload(accessor="data", file=run[0].Stdout, name="LaunchctlPrintGui.raw.txt") AS RawUpload
    FROM scope()

- name: LaunchctlPrintDisabled
  query: |
    LET run = SELECT Stdout, Stderr, ReturnCode FROM execve(argv=["launchctl", "print-disabled", "system"])
    SELECT "launchctl print-disabled system" AS Command, run[0].ReturnCode AS ExitCode,
           len(list=run[0].Stdout) AS StdoutBytes, len(list=run[0].Stderr) AS StderrBytes,
           run[0].Stderr AS Stderr,
           upload(accessor="data", file=run[0].Stdout, name="LaunchctlPrintDisabled.raw.txt") AS RawUpload
    FROM scope()
