name: MacOS.Live.UnifiedLog
description: |
  Live collection of Apple Unified Log events filtered by category and time
  window. Modeled on the Exchange `MacOS.UnifiedLogHunter` artifact pattern:
  uses the native `log` command, runs categories in parallel via async
  foreach, and emits parsed events as VQL rows (no on-disk ndjson files).

  Categories are predicate sets curated for IR — Fast (16, IR-critical) or
  Full (Fast + 20 heavier). For ad-hoc work, set Preset=Custom and pass
  comma-separated names in CustomCategories, or leave a free-form predicate
  in `Predicate` to bypass the table entirely.

  Window: absolute (StartDate / EndDate, timestamp params).

author: Ali Jammal

type: CLIENT

required_permissions:
  - EXECVE

reference:
  - https://docs.velociraptor.app/exchange/artifacts/pages/macos.unifiedloghunter/

precondition: SELECT OS FROM info() WHERE OS = 'darwin' AND StartDate AND EndDate

parameters:
  - name: StartDate
    type: timestamp

  - name: EndDate
    type: timestamp

  - name: Preset
    description: "Fast (16 IR-critical) | Full (Fast + 20 heavier) | Custom"
    default: Fast

  - name: CustomCategories
    description: |
      Comma-separated category names — only honored when Preset=Custom.
      See the Predicates parameter for the full list of names.
    default: ""

  - name: Predicate
    description: |
      Free-form NSPredicate to run in addition to (or instead of) the
      preset selection. Leave blank to use only the preset.
    default: ""

  - name: Length
    description: Max bytes per `log show` invocation (default 100 MB per category).
    type: int
    default: 100000000

  - name: Predicates
    type: csv
    description: |
      Curated predicate table. Edit only if you know what you're doing.
    default: |
      name,tier,predicate
      auth_loginwindow,Fast,"subsystem == ""com.apple.login"" OR subsystem == ""com.apple.loginUI"" OR subsystem == ""com.apple.loginwindow.logging"" OR process == ""loginwindow"""
      auth_session_events,Fast,"eventMessage contains ""com.apple.system.loginwindow"" and eventMessage contains ""SessionAgentNotificationCenter"""
      auth_session_login,Fast,"processImagePath contains ""loginwindow"" and eventMessage contains ""com.apple.sessionDidLogin"""
      auth_screen_lock,Fast,"eventMessage contains ""com.apple.sessionagent.screenIs"""
      auth_method,Fast,"eventMessage contains ""LWScreenLockAuthentication"" and (eventMessage contains ""| Verifying"" or eventMessage contains ""| Using"")"
      auth_result,Fast,"eventMessage contains ""LWDefaultScreenLockUI"" and (eventMessage contains ""authSuccess"" or eventMessage contains ""authFailWithMessage"" or eventMessage contains ""loginPressed"" or eventMessage contains ""authBegan"" or eventMessage contains ""preLoad"")"
      auth_sudo,Fast,"process == ""sudo"" OR eventMessage CONTAINS ""PAM"""
      auth_authd,Fast,"process == ""authd"""
      auth_securityd,Fast,"process == ""securityd"""
      auth_opendirectory,Fast,"subsystem == ""com.apple.opendirectoryd"""
      ssh,Fast,"processImagePath CONTAINS[c] ""sshd"" && (eventMessage CONTAINS[c] ""accepted"" || eventMessage CONTAINS[c] ""error"")"
      screensharing_in,Fast,"process == ""screensharingd"" and eventMessage contains ""Authentication:"""
      screensharing_out,Fast,"process == ""Screen Sharing"""
      gatekeeper,Fast,"process == ""syspolicyd"" OR subsystem == ""com.apple.security.assessment"" OR subsystem == ""com.apple.syspolicy"" OR subsystem == ""com.apple.syspolicy.exec"""
      tcc,Fast,"eventMessage CONTAINS ""TCC"""
      tcc_updates,Fast,"eventMessage contains[c] ""Update Access Record:"""
      xprotect,Fast,"eventMessage CONTAINS ""XProtect"" OR subsystem == ""com.apple.XprotectFramework"" OR eventMessage CONTAINS ""xprotectservice"" OR subsystem == ""com.apple.xprotect"""
      kernel,Full,"process == ""kernel"""
      kernel_panic,Full,"eventMessage CONTAINS ""panic"" OR subsystem == ""com.apple.kext"""
      launchd,Full,"subsystem == ""com.apple.launchd"" OR process == ""launchd"""
      firewall,Full,"process == ""socketfilterfw"" OR subsystem == ""com.apple.alf"" OR subsystem == ""com.apple.ALF.ApplicationFirewall"""
      network,Full,"subsystem == ""com.apple.network"""
      proxy,Full,"process == ""configd"" AND eventMessage CONTAINS ""proxy"""
      vpn,Full,"subsystem == ""com.apple.networkextension"" OR process == ""nehelper"""
      wifi,Full,"process == ""airportd"""
      bluetooth,Full,"process == ""bluetoothd"" OR process == ""blued"" OR subsystem == ""com.apple.Bluetooth"""
      wirelessproxd,Full,"process == ""wirelessproxd"""
      airdrop,Full,"subsystem == ""com.apple.sharing"" OR process == ""sharingd"""
      mdns,Full,"process == ""mDNSResponder"""
      rapportd,Full,"process == ""rapportd"""
      usb_disk,Full,"(subsystem == ""com.apple.imagecapture"" AND (eventMessage CONTAINS ""Removed"" OR eventMessage CONTAINS ""Added"")) OR eventMessage CONTAINS ""AUTH_MOUNT"" OR subsystem == ""com.apple.UnmountAssistantAgent"""
      spotlight,Full,"subsystem == ""com.apple.metadata"" OR process == ""mds"" OR process == ""mdworker"""
      timemachine,Full,"subsystem == ""com.apple.TimeMachine"""
      media,Full,"category == ""MediaRemote"""
      crashes,Full,"subsystem == ""com.apple.crashreporter"" OR process == ""ReportCrash"" OR process == ""spindump"" OR process == ""diagnosticd"""
      softwareupdate,Full,"process == ""softwareupdated"""
      power,Full,"subsystem == ""com.apple.powerd"""

sources:
  - query: |
      LET custom_set <= split(string=CustomCategories, sep=",")

      LET selected <= SELECT name, predicate FROM Predicates
        WHERE (Preset = 'Fast'   AND tier = 'Fast')
           OR (Preset = 'Full')
           OR (Preset = 'Custom' AND name IN custom_set)

      -- Optionally append the free-form predicate as an extra row.
      LET queries <= SELECT * FROM chain(
        a=selected,
        b=if(condition=Predicate,
             then={ SELECT 'custom_predicate' AS name, Predicate AS predicate FROM scope() }))

      LET Raw <= SELECT name, predicate, Stdout FROM foreach(
        row=queries,
        async=TRUE,
        query={
          SELECT name, predicate, Stdout FROM execve(
            length=Length,
            argv=[
              '/usr/bin/log', 'show',
              '--start', grok(grok='%{TIMESTAMP_ISO8601:Date}', data=StartDate).Date,
              '--end',   grok(grok='%{TIMESTAMP_ISO8601:Date}', data=EndDate).Date,
              '--predicate', predicate,
              '--style', 'json'])
        }) WHERE NOT Stdout = '[]'

      SELECT name AS Category,
             timestamp(string=get(member='timestamp'))   AS EventTime,
             get(member='eventMessage')                  AS EventMessage,
             get(member='eventType')                     AS EventType,
             get(member='messageType')                   AS MessageType,
             get(member='subsystem')                     AS Subsystem,
             get(member='category')                      AS LogCategory,
             get(member='processID')                     AS PID,
             get(member='processImagePath')              AS ProcessImagePath,
             get(member='senderImagePath')               AS SenderImagePath,
             get(member='activityIdentifier')            AS ActivityID,
             get(member='parentActivityIdentifier')      AS ParentActivityID,
             get(member='threadID')                      AS _ThreadID,
             get(member='machTimestamp')                 AS _TimeSinceBoot,
             get(member='traceID')                       AS _TraceID,
             get(member='source')                        AS _Source,
             get(member='formatString')                  AS _FormatString,
             get(member='backtrace')                     AS _Backtrace,
             get(member='bootUUID')                      AS _BootUUID,
             get(member='timezoneName')                  AS _TimezoneName
      FROM foreach(
        row=Raw,
        query={
          SELECT name, * FROM parse_json_array(data=Stdout)
        })
