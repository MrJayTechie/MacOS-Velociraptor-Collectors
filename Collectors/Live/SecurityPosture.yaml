name: MacOS.Live.SecurityPosture
description: |
  Captures runtime security flags: Gatekeeper, SIP, FileVault, firewall, NVRAM
  boot-args. These are kernel/runtime values — not extractable from disk files
  alone. If any come back "disabled", treat as a critical finding.
author: Ali Jammal

precondition: SELECT OS FROM info() WHERE OS =~ 'darwin'

sources:
- name: Spctl
  query: |
    LET out = "/tmp/MacOS.Live.SecurityPosture.Spctl.raw.txt"
    LET run = SELECT Stdout, Stderr, ReturnCode
              FROM execve(argv=["/bin/sh", "-c", "spctl --status > " + out + " 2>&1"])
    SELECT "spctl --status" AS Command, run[0].ReturnCode AS ExitCode,
           file_info(filename=out).Size AS StdoutBytes, run[0].Stderr AS Stderr,
           upload(file=out, name="Spctl.raw.txt") AS RawUpload FROM scope()

- name: Csrutil
  query: |
    LET out = "/tmp/MacOS.Live.SecurityPosture.Csrutil.raw.txt"
    LET run = SELECT Stdout, Stderr, ReturnCode
              FROM execve(argv=["/bin/sh", "-c", "csrutil status > " + out + " 2>&1"])
    SELECT "csrutil status" AS Command, run[0].ReturnCode AS ExitCode,
           file_info(filename=out).Size AS StdoutBytes, run[0].Stderr AS Stderr,
           upload(file=out, name="Csrutil.raw.txt") AS RawUpload FROM scope()

