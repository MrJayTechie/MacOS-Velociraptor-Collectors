- name: FirewallGlobal
  query: |
    LET out = "/tmp/MacOS.Live.SecurityPosture.FirewallGlobal.raw.txt"
    LET run = SELECT Stdout, Stderr, ReturnCode
              FROM execve(argv=["/bin/sh", "-c",
                "/usr/libexec/ApplicationFirewall/socketfilterfw --getglobalstate > " + out + " 2>&1"])
