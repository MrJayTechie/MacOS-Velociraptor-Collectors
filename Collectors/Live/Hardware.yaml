name: MacOS.Live.Hardware
description: |
  Captures hardware / OS / storage snapshot via system_profiler -json.
  Output is native JSON (preserved as-is, not flattened to JSONL).
author: Ali Jammal

precondition: SELECT OS FROM info() WHERE OS =~ 'darwin'

sources:
- name: SystemProfiler
  query: |
    LET out = "/tmp/MacOS.Live.Hardware.SystemProfiler.raw.json"
    LET run = SELECT Stdout, Stderr, ReturnCode
              FROM execve(argv=["/bin/sh", "-c",
                "system_profiler -json SPHardwareDataType SPSoftwareDataType SPStorageDataType > " + out])
    SELECT "system_profiler -json SPHardwareDataType SPSoftwareDataType SPStorageDataType" AS Command,
           run[0].ReturnCode AS ExitCode,
           file_info(filename=out).Size AS StdoutBytes, run[0].Stderr AS Stderr,
           upload(file=out, name="SystemProfiler.raw.json") AS RawUpload FROM scope()
