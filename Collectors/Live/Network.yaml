name: MacOS.Live.Network
description: |
  Captures live network state: sockets, routing, ARP, DNS resolver config, pf rules.
  Uploads raw stdout verbatim and emits one JSONL row per command with metadata.
author: Ali Jammal

precondition: SELECT OS FROM info() WHERE OS =~ 'darwin'

sources:
- name: LsofInet
  query: |
    LET run = SELECT Stdout, Stderr, ReturnCode FROM execve(argv=["lsof", "-i", "-nP"])
    SELECT "lsof -i -nP" AS Command, run[0].ReturnCode AS ExitCode,
           len(list=run[0].Stdout) AS StdoutBytes, len(list=run[0].Stderr) AS StderrBytes,
           run[0].Stderr AS Stderr,
           upload(accessor="data", file=run[0].Stdout, name="LsofInet.raw.txt") AS RawUpload
    FROM scope()

- name: Netstat
  query: |
    LET run = SELECT Stdout, Stderr, ReturnCode FROM execve(argv=["netstat", "-anv"])
    SELECT "netstat -anv" AS Command, run[0].ReturnCode AS ExitCode,
           len(list=run[0].Stdout) AS StdoutBytes, len(list=run[0].Stderr) AS StderrBytes,
           run[0].Stderr AS Stderr,
           upload(accessor="data", file=run[0].Stdout, name="Netstat.raw.txt") AS RawUpload
    FROM scope()

- name: Route
