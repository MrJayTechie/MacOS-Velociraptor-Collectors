name: MacOS.Live.Network
description: |
  Captures live network state: sockets, routing, ARP, DNS resolver config, pf rules.
  Output is redirected to /tmp/ before upload to bypass the 10 KB data-accessor cap.
author: Ali Jammal

precondition: SELECT OS FROM info() WHERE OS =~ 'darwin'

sources:
- name: LsofInet
  query: |
    LET out = "/tmp/MacOS.Live.Network.LsofInet.raw.txt"
    LET run = SELECT Stdout, Stderr, ReturnCode
              FROM execve(argv=["/bin/sh", "-c", "lsof -i -nP > " + out])
    SELECT "lsof -i -nP" AS Command, run[0].ReturnCode AS ExitCode,
           file_info(filename=out).Size AS StdoutBytes, run[0].Stderr AS Stderr,
           upload(file=out, name="LsofInet.raw.txt") AS RawUpload FROM scope()

- name: Netstat
  query: |
    LET out = "/tmp/MacOS.Live.Network.Netstat.raw.txt"
    LET run = SELECT Stdout, Stderr, ReturnCode
              FROM execve(argv=["/bin/sh", "-c", "netstat -anv > " + out])
    SELECT "netstat -anv" AS Command, run[0].ReturnCode AS ExitCode,
           file_info(filename=out).Size AS StdoutBytes, run[0].Stderr AS Stderr,
           upload(file=out, name="Netstat.raw.txt") AS RawUpload FROM scope()

