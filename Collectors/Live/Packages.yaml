name: MacOS.Live.Packages
description: |
  Captures installed pkg receipts via pkgutil. Complements the offline
  /Library/Receipts/InstallHistory.plist by catching pkgs registered with
  pkgutil but not yet written to the install history.
author: Ali Jammal

precondition: SELECT OS FROM info() WHERE OS =~ 'darwin'

sources:
- name: PkgutilList
  query: |
    LET run = SELECT Stdout, Stderr, ReturnCode FROM execve(argv=["pkgutil", "--pkgs"])
    SELECT "pkgutil --pkgs" AS Command, run[0].ReturnCode AS ExitCode,
           len(list=run[0].Stdout) AS StdoutBytes, len(list=run[0].Stderr) AS StderrBytes,
           run[0].Stderr AS Stderr,
           upload(accessor="data", file=run[0].Stdout, name="PkgutilList.raw.txt") AS RawUpload
    FROM scope()

- name: PkgutilInfoPerPkg
  query: |
    # For every installed pkg id, capture pkg-info (install date, location, volume).
    LET pkgs_out = SELECT Stdout FROM execve(argv=["pkgutil", "--pkgs"])
    LET pkgs = SELECT Line AS PkgId
               FROM parse_lines(filename=pkgs_out[0].Stdout, accessor="data")
               WHERE Line != ""

    SELECT
      PkgId,
      (SELECT Stdout, Stderr, ReturnCode
       FROM execve(argv=["pkgutil", "--pkg-info", PkgId])) AS Info
    FROM pkgs
