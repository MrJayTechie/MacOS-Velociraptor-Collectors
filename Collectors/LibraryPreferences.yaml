name: MacOS.Collection.LibraryPreferences
description: |
  Collect files from /Users/*/Library/Preferences and /Library/Preferences (recursive) and upload the file contents.
author: Ali Jammal

precondition: SELECT OS FROM info() WHERE OS =~ 'darwin'

parameters:
- name: PreferencesGlob
  default: /Users/*/Library/Preferences/**,/Library/Preferences/**

sources:
- name: Library Preferences (download)
  query: |
    SELECT OSPath, Name, Mtime, Size,
           hash(path=OSPath) AS SHA256,
           upload(file=OSPath) AS Upload
    FROM glob(globs=split(string=PreferencesGlob, sep=","))
