name: MacOS.Collection.OSInstallationDate
description: |
  Collection of OSInstallationDate
author: Ali Jammal

precondition: SELECT OS FROM info() WHERE OS =~ 'darwin'

parameters:
- name: OSInstallationDateGlob
  default: /private/var/db/.AppleSetupDone,/private/var/db/softwareupdate/journal.plist

sources:
- name: OSInstallationDateGlob files
  query: |
    SELECT OSPath, Name, Mtime, Size,
           hash(path=OSPath) AS SHA256,
           upload(file=OSPath) AS Upload
    FROM glob(globs=split(string=OSInstallationDateGlob, sep=","))
