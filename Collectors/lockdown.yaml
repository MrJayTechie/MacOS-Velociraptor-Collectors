name: MacOS.Collection.lockdown
description: |
  Connecting an iOS device to another system generates a lockdown “Trust This Computer”
author: Ali Jammal

precondition: SELECT OS FROM info() WHERE OS =~ 'darwin'

parameters:
- name: lockdownGlob
  default: /private/var/db/lockdown/**

sources:
- name: lockdown Files
  query: |
    SELECT OSPath, Name, Mtime, Size,
           hash(path=OSPath) AS SHA256,
           upload(file=OSPath) AS Upload
    FROM glob(globs=split(string=lockdownGlob, sep=","))
