name: MacOS.Collection.SafariFiles
description: |
  Find Safari files on macOS and upload the file contents.
author: Ali Jammal

precondition: SELECT OS FROM info() WHERE OS =~ 'darwin'

parameters:
- name: SafariGlob
  default: /Users/*/Library/Safari/**,/Users/*/Library/Containers/com.apple.Safari/Data/Library/Caches/com.apple.Safari/TabSnapshots/**,/Users/*/Library/Containers/com.apple.Safari/Data/Library/Cookies/Cookies.binarycookies

sources:
- name: Safari files
  query: |
    SELECT OSPath, Name, Mtime, Size,
           hash(path=OSPath) AS SHA256,
           upload(file=OSPath) AS Upload
    FROM glob(globs=split(string=SafariGlob, sep=","))
