name: MacOS.Collection.Sudoers
description: |
  Collect /etc/sudoers
author: Ali Jammal
precondition: SELECT OS FROM info() WHERE OS =~ 'darwin'

parameters:
- name: SudoersGlob
  default: /etc/sudoers

sources:
- name: Sudoers files
  query: |
    SELECT OSPath, Name, Mtime, Size,
           hash(path=OSPath) AS SHA256,
           upload(file=OSPath) AS Upload
    FROM glob(globs=split(string=SudoersGlob, sep=","))
