name: MacOS.Collection.Reminders
description: |
  Collection of Reminders
author: Ali Jammal

precondition: SELECT OS FROM info() WHERE OS =~ 'darwin'

parameters:
- name: RemindersGlob
  default: /Users/*/Library/Group Containers/group.com.apple.reminders/Container_v1/Stores/**

sources:
- name: Reminders files
  query: |
    SELECT OSPath, Name, Mtime, Size,
           hash(path=OSPath) AS SHA256,
           upload(file=OSPath) AS Upload
    FROM glob(globs=split(string=RemindersGlob, sep=","))
